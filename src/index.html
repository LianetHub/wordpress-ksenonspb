<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Карта сайта</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow">

        <link rel="stylesheet" href="css/libs/fancybox.min.css">
        <link rel="stylesheet" href="css/reset.min.css">
        <link rel="stylesheet" href="css/style.min.css">

        <style>
            .sitemap-page {
                margin: 0;
                min-height: 100vh;
                background: #3d3d3d;
                color: #fff;
                font-family: Inter, system-ui, -apple-system, sans-serif;
                font-size: 18px;
                line-height: 1.4;
            }

            .sitemap {
                max-width: 720px;
                margin: 0 auto;
                padding: 48px 24px 64px;
            }

            .sitemap__section+.sitemap__section {
                margin-top: 40px;
            }

            .sitemap__title {
                margin: 0 0 20px;
                font-size: 20px;
                font-weight: 400;
            }

            .sitemap__list {
                margin: 0;
                padding-left: 1.4em;
            }

            .sitemap__item+.sitemap__item {
                margin-top: 8px;
            }

            .sitemap__link {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 3px;
            }

            .sitemap__link:hover {
                opacity: 0.85;
            }
        </style>
    </head>
    <body>
     

        @@include('html/_popups.html', {})
        @@include('html/_js.html', {})
    </body>
</html>
